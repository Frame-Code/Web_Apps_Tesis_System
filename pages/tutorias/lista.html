<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorías — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- navegacion -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html" class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html" class="nav-link">Proyectos</a>
            <a href="../avances/lista.html" class="nav-link">Avances</a>
            <a href="lista.html" class="nav-link activo">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html" class="nav-link">Usuarios</a>
        </div>
    <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 p-4">

        <h2 class="mb-4">Tutorías</h2>

        <div class="card shadow-sm">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap">
                    <!-- Solo visible para tutores y coordinadores -->
                    <a href="formulario.html" class="btn btn-success d-none" id="btn-nueva">
                        + Nueva Tutoría
                    </a>
                </div>
            </div>

            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Tema</th>
                            <th>Proyecto</th>
                            <th>Tutor</th>
                            <th>Estudiante</th>
                            <th>Fecha</th>
                            <th>Duración (h)</th>
                            <th>Modalidad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-tutorias">
                        <!-- JavaScript llena este tbody -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        // --- Control de roles ---
        // Tutores Y coordinadores pueden crear/editar/eliminar tutorías
        var rol = getRolActual();
        var puedeEditarTutorias = (rol === 'tutor' || rol === 'coordinador');

        if (puedeEditarTutorias) {
            document.getElementById('btn-nueva').classList.remove('d-none');
        }

        var todasLasTutorias = getTutorias();

        var coloresBadge = {
            'programada': 'bg-warning text-dark',
            'realizada':  'bg-success',
            'cancelada':  'bg-danger'
        };

        var coloresModalidad = {
            'presencial': 'bg-primary',
            'virtual':    'bg-info text-dark'
        };

        function renderTabla(lista) {
            var tbody = document.getElementById('tbody-tutorias');
            tbody.innerHTML = '';

            if (lista.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="9" class="text-center text-muted py-3">' +
                    'No se encontraron tutorías.</td></tr>';
                return;
            }

            lista.forEach(function(tutoria) {
                var tutor      = tutoria.tutor_id      ? getUsuarioPorId(tutoria.tutor_id)      : null;
                var estudiante = tutoria.estudiante_id ? getUsuarioPorId(tutoria.estudiante_id) : null;
                var proyecto   = getProyectos().find(function(p) { return p.id == tutoria.proyecto_id; });

                var badgeEstado    = coloresBadge[tutoria.estado]       || 'bg-secondary';
                var badgeModalidad = coloresModalidad[tutoria.modalidad] || 'bg-secondary';

                // Acciones: solo tutores y coordinadores
                var accionesHtml = puedeEditarTutorias
                    ? '<a href="formulario.html?id=' + tutoria.id + '" ' +
                      'class="btn btn-sm btn-outline-primary me-1">Editar</a>' +
                      '<button onclick="eliminar(' + tutoria.id + ')" ' +
                      'class="btn btn-sm btn-outline-danger">Eliminar</button>'
                    : '<span class="text-muted small">Solo lectura</span>';

                var fila = document.createElement('tr');
                fila.innerHTML =
                    '<td>' + tutoria.tema + '</td>' +
                    '<td>' + (proyecto ? proyecto.titulo : '<em class="text-muted">—</em>') + '</td>' +
                    '<td>' + (tutor      ? tutor.nombre      : '<em class="text-muted">—</em>') + '</td>' +
                    '<td>' + (estudiante ? estudiante.nombre : '<em class="text-muted">—</em>') + '</td>' +
                    '<td>' + formatearFecha(tutoria.fecha) + '</td>' +
                    '<td>' + tutoria.duracion + '</td>' +
                    '<td><span class="badge ' + badgeModalidad + '">' + tutoria.modalidad + '</span></td>' +
                    '<td><span class="badge ' + badgeEstado    + '">' + tutoria.estado    + '</span></td>' +
                    '<td>' + accionesHtml + '</td>';

                tbody.appendChild(fila);
            });
        }

        // Dibujar la tabla al cargar la página
        renderTabla(todasLasTutorias);

        // Eliminar tutoría (solo tutores y coordinadores)
        function eliminar(id) {
            if (!puedeEditarTutorias) return;
            if (!confirm('¿Eliminar esta tutoría? Esta acción no se puede deshacer.'))
                return;

            var actualizadas = getTutorias().filter(function(t) { return t.id !== id; });
            guardarTutorias(actualizadas);

            todasLasTutorias = todasLasTutorias.filter(function(t) { return t.id !== id; });
            renderTabla(todasLasTutorias);
        }
    </script>

</body>
</html>
