<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoría — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- Navegación -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html" class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html" class="nav-link">Proyectos</a>
            <a href="../Avances/lista.html" class="nav-link">Avances</a>
            <a href="lista.html" class="nav-link activo">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html" class="nav-link">Usuarios</a>
        </div>
        <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 p-4">
        <h2 class="mb-4" id="titulo-pagina">Nueva Tutoría</h2>

        <div class="card shadow-sm" style="max-width: 720px;">
            <div class="card-body">

                <div class="alert alert-danger d-none" id="alerta-error"></div>
                <div class="alert alert-success d-none" id="alerta-exito"></div>

                <form id="form-tutoria" onsubmit="guardar(event)">

                    <div class="mb-3">
                        <label for="proyecto_id" class="form-label">Proyecto *</label>
                        <select id="proyecto_id" class="form-select" required>
                            <option value="">— Cargando proyectos... —</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="tutor_id" class="form-label">Tutor *</label>
                        <select id="tutor_id" class="form-select" required>
                            <option value="">— Cargando tutores... —</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha_hora" class="form-label">Fecha y hora *</label>
                            <input type="datetime-local" id="fecha_hora" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="duracion_min" class="form-label">Duración (minutos) *</label>
                            <input type="number" id="duracion_min" class="form-control"
                                   min="15" max="480" step="15" value="60" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="modalidad" class="form-label">Modalidad</label>
                        <select id="modalidad" class="form-select">
                            <option value="virtual">Virtual</option>
                            <option value="presencial">Presencial</option>
                            <option value="asincrona">Asíncrona</option>
                        </select>
                        <div class="form-text text-warning d-none" id="aviso-presencial">
                            ⚠ Máximo 4 tutorías presenciales por proyecto.
                        </div>
                    </div>

                    <!-- Estado solo visible al editar -->
                    <div class="mb-3 d-none" id="campo-estado">
                        <label for="estado" class="form-label">Estado</label>
                        <select id="estado" class="form-select">
                            <option value="programada">Programada</option>
                            <option value="realizada">Realizada</option>
                            <option value="reprogramada">Reprogramada</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="observaciones" class="form-label">Observaciones / Tema</label>
                        <textarea id="observaciones" class="form-control" rows="3"
                                  placeholder="Ej: Revisión del capítulo 1, correcciones de metodología..."></textarea>
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <a href="lista.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success" id="btn-guardar">Guardar tutoría</button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        const API      = '../../backend/index.php';
        const params   = new URLSearchParams(window.location.search);
        const idEditar = params.get('id');
        let   usuarioActual = null;

        function mostrarError(msg) {
            const el = document.getElementById('alerta-error');
            el.textContent = msg;
            el.classList.remove('d-none');
            document.getElementById('alerta-exito').classList.add('d-none');
        }

        function mostrarExitoForm(msg) {
            const el = document.getElementById('alerta-exito');
            el.textContent = msg;
            el.classList.remove('d-none');
            document.getElementById('alerta-error').classList.add('d-none');
        }

        async function init() {
            // Verificar sesión
            try {
                const res = await fetch(API + '?accion=sesion', { credentials: 'include' });
                if (!res.ok) { window.location.href = '../login.html'; return; }
                usuarioActual = (await res.json()).data;
            } catch (e) {
                window.location.href = '../login.html';
                return;
            }

            // Solo tutores y coordinadores pueden acceder
            if (usuarioActual.rol === 'estudiante') {
                window.location.href = 'lista.html';
                return;
            }

            // Cargar proyectos y tutores en paralelo
            await Promise.all([cargarProyectos(), cargarTutores()]);

            // Mostrar aviso de límite presencial al seleccionar modalidad
            document.getElementById('modalidad').addEventListener('change', function() {
                const aviso = document.getElementById('aviso-presencial');
                if (this.value === 'presencial') {
                    aviso.classList.remove('d-none');
                } else {
                    aviso.classList.add('d-none');
                }
            });

            if (idEditar) {
                document.getElementById('titulo-pagina').textContent = 'Editar Tutoría';
                document.getElementById('campo-estado').classList.remove('d-none');
                await cargarTutoria(idEditar);
            } else {
                // Por defecto la fecha mínima es ahora + 30 minutos
                const ahora = new Date(Date.now() + 30 * 60000);
                document.getElementById('fecha_hora').min = ahora.toISOString().slice(0, 16);
            }
        }

        async function cargarProyectos() {
            try {
                const res  = await fetch(API + '?accion=listar_proyectos', { credentials: 'include' });
                const json = await res.json();
                const sel  = document.getElementById('proyecto_id');
                sel.innerHTML = '<option value="">— Selecciona un proyecto —</option>';
                (json.data || []).forEach(function(p) {
                    const op = document.createElement('option');
                    op.value       = p.id;
                    op.textContent = p.titulo;
                    sel.appendChild(op);
                });
            } catch (e) {
                console.error('Error cargando proyectos', e);
            }
        }

        async function cargarTutores() {
            try {
                const res  = await fetch(API + '?accion=listar_tutores', { credentials: 'include' });
                const json = await res.json();
                const sel  = document.getElementById('tutor_id');
                sel.innerHTML = '<option value="">— Selecciona un tutor —</option>';
                (json.data || []).forEach(function(u) {
                    const op = document.createElement('option');
                    op.value       = u.id;
                    op.textContent = u.nombre + ' ' + u.apellido;
                    sel.appendChild(op);
                });
            } catch (e) {
                console.error('Error cargando tutores', e);
            }
        }

        async function cargarTutoria(id) {
            try {
                const res  = await fetch(API + '?accion=ver_tutoria&id=' + id, { credentials: 'include' });
                const json = await res.json();

                if (!res.ok || !json.data) {
                    mostrarError('Tutoría no encontrada.');
                    return;
                }

                const t = json.data;

                document.getElementById('proyecto_id').value  = t.proyecto_id;
                document.getElementById('tutor_id').value     = t.tutor_id;
                // Convertir "YYYY-MM-DD HH:MM:SS" → "YYYY-MM-DDTHH:MM" para datetime-local
                document.getElementById('fecha_hora').value   = t.fecha_hora ? t.fecha_hora.replace(' ', 'T').substring(0, 16) : '';
                document.getElementById('duracion_min').value = t.duracion_min;
                document.getElementById('modalidad').value    = t.modalidad;
                document.getElementById('estado').value       = t.estado;
                document.getElementById('observaciones').value = t.observaciones || '';

                if (t.modalidad === 'presencial') {
                    document.getElementById('aviso-presencial').classList.remove('d-none');
                }
            } catch (e) {
                mostrarError('Error al cargar la tutoría.');
            }
        }

        async function guardar(event) {
            event.preventDefault();
            document.getElementById('alerta-error').classList.add('d-none');
            document.getElementById('alerta-exito').classList.add('d-none');

            const proyecto_id   = parseInt(document.getElementById('proyecto_id').value) || 0;
            const tutor_id      = parseInt(document.getElementById('tutor_id').value)    || 0;
            const fecha_hora    = document.getElementById('fecha_hora').value;
            const duracion_min  = parseInt(document.getElementById('duracion_min').value) || 0;
            const modalidad     = document.getElementById('modalidad').value;
            const estado        = document.getElementById('estado').value || 'programada';
            const observaciones = document.getElementById('observaciones').value.trim() || null;

            // Validaciones frontend
            if (!proyecto_id)  { mostrarError('Debes seleccionar un proyecto.'); return; }
            if (!tutor_id)     { mostrarError('Debes seleccionar un tutor.'); return; }
            if (!fecha_hora)   { mostrarError('La fecha y hora son obligatorias.'); return; }
            if (!duracion_min) { mostrarError('La duración debe ser mayor a 0.'); return; }

            // Al crear, validar que la fecha sea futura
            if (!idEditar && new Date(fecha_hora) <= new Date()) {
                mostrarError('La fecha y hora debe ser en el futuro.');
                return;
            }

            const payload = { proyecto_id, tutor_id, fecha_hora, duracion_min, modalidad, estado, observaciones };

            const btn = document.getElementById('btn-guardar');
            btn.disabled    = true;
            btn.textContent = 'Guardando...';

            try {
                const url = idEditar
                    ? API + '?accion=editar_tutoria&id=' + idEditar
                    : API + '?accion=crear_tutoria';

                const res  = await fetch(url, {
                    method:      'POST',
                    credentials: 'include',
                    headers:     { 'Content-Type': 'application/json' },
                    body:        JSON.stringify(payload)
                });
                const json = await res.json();

                if (!res.ok) {
                    mostrarError(json.error || 'Ocurrió un error al guardar.');
                    return;
                }

                mostrarExitoForm(idEditar ? 'Tutoría actualizada correctamente.' : 'Tutoría registrada correctamente.');
                setTimeout(function() { window.location.href = 'lista.html'; }, 1500);

            } catch (e) {
                mostrarError('Error de conexión con el servidor.');
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Guardar tutoría';
            }
        }

        init();
    </script>

</body>
</html>
