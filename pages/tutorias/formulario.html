<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutoría — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- navegacion -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html" class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html" class="nav-link">Proyectos</a>
            <a href="../avances/lista.html" class="nav-link">Avances</a>
            <a href="lista.html" class="nav-link activo">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html" class="nav-link">Usuarios</a>
        </div>
    <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!-- main -->
    <main class="flex-grow-1 p-4">
        <h2 class="mb-4" id="titulo-pagina">Nueva Tutoría</h2>
        <div class="card shadow-sm" style="max-width: 700px;">
            <div class="card-body">

                <!-- Mensajes informativos -->
                <div class="alert alert-danger d-none" id="alerta-error"></div>
                <div class="alert alert-success d-none" id="alerta-exito"></div>

                <form onsubmit="guardar(event)">

                    <div class="mb-3">
                        <label for="tema" class="form-label">Tema de la tutoría: *</label>
                        <input type="text" id="tema" name="tema" class="form-control"
                               required placeholder="Ej: Revisión del capítulo 1">
                    </div>

                    <div class="mb-3">
                        <label for="proyecto_id" class="form-label">Proyecto: *</label>
                        <select id="proyecto_id" name="proyecto_id" class="form-select" required>
                            <option value="">— Selecciona un proyecto —</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="tutor_id" class="form-label">Tutor: *</label>
                        <select id="tutor_id" name="tutor_id" class="form-select" required>
                            <option value="">— Selecciona un tutor —</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="estudiante_id" class="form-label">Estudiante: *</label>
                        <select id="estudiante_id" name="estudiante_id" class="form-select" required>
                            <option value="">— Selecciona un estudiante —</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="fecha" class="form-label">Fecha: *</label>
                            <input type="date" id="fecha" name="fecha"
                                   class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="duracion" class="form-label">Duración (horas): *</label>
                            <input type="number" id="duracion" name="duracion" class="form-control"
                                   min="0.5" max="8" step="0.5" value="1" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="modalidad" class="form-label">Modalidad:</label>
                        <select id="modalidad" name="modalidad" class="form-select">
                            <option value="presencial">Presencial</option>
                            <option value="virtual">Virtual</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="estado" class="form-label">Estado:</label>
                        <select id="estado" name="estado" class="form-select">
                            <option value="programada">Programada</option>
                            <option value="realizada">Realizada</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="lista.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar tutoría</button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <!-- footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        // --- Guard de rol: solo tutores y coordinadores pueden crear/editar tutorías ---
        (function() {
            var rol = getRolActual();
            if (rol !== 'tutor' && rol !== 'coordinador') {
                window.location.replace('lista.html');
            }
        })();

        // Llenar selects con datos reales
        var usuarios  = getUsuarios();
        var proyectos = getProyectos();

        var selectProyecto   = document.getElementById('proyecto_id');
        var selectTutor      = document.getElementById('tutor_id');
        var selectEstudiante = document.getElementById('estudiante_id');

        proyectos.forEach(function(p) {
            var op = document.createElement('option');
            op.value       = p.id;
            op.textContent = p.titulo;
            selectProyecto.appendChild(op);
        });

        usuarios.forEach(function(u) {
            var op = document.createElement('option');
            op.value       = u.id;
            op.textContent = u.nombre;

            if (u.rol === 'tutor')      selectTutor.appendChild(op);
            if (u.rol === 'estudiante') selectEstudiante.appendChild(op.cloneNode(true));
        });

        // Detectar si estamos editando una tutoría existente
        var params      = new URLSearchParams(window.location.search);
        var idEdicion   = params.get('id');
        var tutoriaEditar = null;

        if (idEdicion) {
            tutoriaEditar = getTutorias().find(function(t) { return t.id == idEdicion; });

            if (tutoriaEditar) {
                document.getElementById('titulo-pagina').textContent = 'Editar Tutoría';

                document.getElementById('tema').value          = tutoriaEditar.tema;
                document.getElementById('proyecto_id').value   = tutoriaEditar.proyecto_id;
                document.getElementById('tutor_id').value      = tutoriaEditar.tutor_id;
                document.getElementById('estudiante_id').value = tutoriaEditar.estudiante_id;
                document.getElementById('fecha').value         = tutoriaEditar.fecha;
                document.getElementById('duracion').value      = tutoriaEditar.duracion;
                document.getElementById('modalidad').value     = tutoriaEditar.modalidad;
                document.getElementById('estado').value        = tutoriaEditar.estado;
            }
        }

        // Función para mostrar alertas
        function mostrarAlerta(id, mensaje, tipo) {
            var el = document.getElementById(id);
            el.textContent = mensaje;
            el.classList.remove('d-none');
            if (tipo === 'exito') {
                setTimeout(function() { el.classList.add('d-none'); }, 3000);
            }
        }

        // Se llama cuando el usuario envía el formulario
        function guardar(event) {
            event.preventDefault();

            // Ocultar alertas anteriores
            document.getElementById('alerta-error').classList.add('d-none');
            document.getElementById('alerta-exito').classList.add('d-none');

            // Leer valores del formulario
            var tema          = document.getElementById('tema').value.trim();
            var proyecto_id   = parseInt(document.getElementById('proyecto_id').value);
            var tutor_id      = parseInt(document.getElementById('tutor_id').value);
            var estudiante_id = parseInt(document.getElementById('estudiante_id').value);
            var fecha         = document.getElementById('fecha').value;
            var duracion      = parseFloat(document.getElementById('duracion').value);
            var modalidad     = document.getElementById('modalidad').value;
            var estado        = document.getElementById('estado').value;

            // Validaciones
            if (!tema) {
                mostrarAlerta('alerta-error', 'El tema de la tutoría es obligatorio.', 'error');
                return;
            }
            if (!proyecto_id) {
                mostrarAlerta('alerta-error', 'Debes seleccionar un proyecto.', 'error');
                return;
            }
            if (!tutor_id) {
                mostrarAlerta('alerta-error', 'Debes seleccionar un tutor.', 'error');
                return;
            }
            if (!estudiante_id) {
                mostrarAlerta('alerta-error', 'Debes seleccionar un estudiante.', 'error');
                return;
            }
            if (!fecha) {
                mostrarAlerta('alerta-error', 'La fecha es obligatoria.', 'error');
                return;
            }
            if (!duracion || duracion <= 0) {
                mostrarAlerta('alerta-error', 'La duración debe ser mayor a 0.', 'error');
                return;
            }

            var tutorias = getTutorias();

            if (tutoriaEditar) {
                // Actualiza la tutoría existente
                for (var i = 0; i < tutorias.length; i++) {
                    if (tutorias[i].id == idEdicion) {
                        tutorias[i].tema          = tema;
                        tutorias[i].proyecto_id   = proyecto_id;
                        tutorias[i].tutor_id      = tutor_id;
                        tutorias[i].estudiante_id = estudiante_id;
                        tutorias[i].fecha         = fecha;
                        tutorias[i].duracion      = duracion;
                        tutorias[i].modalidad     = modalidad;
                        tutorias[i].estado        = estado;
                        break;
                    }
                }
                guardarTutorias(tutorias);
                mostrarAlerta('alerta-exito', 'Tutoría actualizada correctamente.', 'exito');

            } else {
                // Crea nueva tutoría
                var nuevaTutoria = {
                    id:            nuevoId(tutorias),
                    tema:          tema,
                    proyecto_id:   proyecto_id,
                    tutor_id:      tutor_id,
                    estudiante_id: estudiante_id,
                    fecha:         fecha,
                    duracion:      duracion,
                    modalidad:     modalidad,
                    estado:        estado
                };
                tutorias.push(nuevaTutoria);
                guardarTutorias(tutorias);
                mostrarAlerta('alerta-exito', 'Tutoría registrada correctamente.', 'exito');
                document.querySelector('form').reset();
            }

            // Redirigir a la lista después de 1.5 segundos
            setTimeout(function() {
                window.location.href = 'lista.html';
            }, 1500);
        }
    </script>

</body>
</html>
