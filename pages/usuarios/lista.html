<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- Navegación -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html" class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html" class="nav-link">Proyectos</a>
            <a href="../Avances/lista.html" class="nav-link">Avances</a>
            <a href="../tutorias/lista.html" class="nav-link">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="lista.html" class="nav-link activo">Usuarios</a>
        </div>
        <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2>Control de Usuarios del Sistema</h2>
            <div id="alertaGlobal" class="alert py-2 px-3 m-0 d-none"></div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <div class="row g-2">
                    <div class="col-sm-6 col-md-4">
                        <select id="filtroRol" class="form-select" onchange="cargarUsuarios()">
                            <option value="">Todos los roles</option>
                            <option value="estudiante">Estudiantes</option>
                            <option value="tutor">Tutores</option>
                            <option value="coordinador">Coordinadores</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-md-4">
                        <select id="filtroActivo" class="form-select" onchange="cargarUsuarios()">
                            <option value="">Todos los estados</option>
                            <option value="1">Activos</option>
                            <option value="0">Inactivos</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre Completo</th>
                                <th>Email (Usuario)</th>
                                <th>Rol asignado</th>
                                <th>Estado de cuenta</th>
                                <th>Fecha Registro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-usuarios">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-4">
                                    <div class="spinner-border spinner-border-sm me-2"></div> Cargando registros...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-2 small mt-auto">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        const API = '../../backend/index.php';
        let usuarioLogueado = null;

        async function init() {
            // Verificar sesión con la lógica global unificada
            usuarioLogueado = await getUsuarioActual();
            
            if (!usuarioLogueado) {
                window.location.href = '../login.html';
                return;
            }

            // Restricción estricta del lado del cliente solicitada (Solo Coordinador)
            if (usuarioLogueado.rol !== 'coordinador') {
                document.querySelector('main').innerHTML = `
                    <div class="alert alert-danger my-5 shadow-sm text-center">
                        <h4 class="fw-bold">Acceso Denegado</h4>
                        <p class="mb-0">Lo sentimos, esta sección está reservada exclusivamente para usuarios con rol de <strong>coordinador</strong>.</p>
                        <a href="../dashboard.html" class="btn btn-danger mt-3 btn-sm">Volver al Inicio</a>
                    </div>
                `;
                return;
            }

            await cargarUsuarios();
        }

        async function cargarUsuarios() {
            const rol = document.getElementById('filtroRol').value;
            const activo = document.getElementById('filtroActivo').value;

            let url = API + '?accion=listar_usuarios';
            if (rol) url += '&rol=' + rol;
            if (activo !== '') url += '&activo=' + activo;

            try {
                const res = await fetch(url, { credentials: 'include' });
                const json = await res.json();
                
                if (!res.ok) {
                    mostrarAlerta(json.error || 'Error al obtener usuarios.', 'danger');
                    return;
                }

                renderTabla(json.data || []);
            } catch (e) {
                document.getElementById('tbody-usuarios').innerHTML = `
                    <tr><td colspan="6" class="text-center text-danger py-3">Error de comunicación con el servidor.</td></tr>
                `;
            }
        }

        function renderTabla(usuarios) {
            const tbody = document.getElementById('tbody-usuarios');
            tbody.innerHTML = '';

            if (usuarios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">No se encontraron usuarios bajo los filtros seleccionados.</td></tr>';
                return;
            }

            usuarios.forEach(u => {
                const fila = document.createElement('tr');
                
                const badgeEstado = u.activo == 1 
                    ? '<span class="badge bg-success">Activo</span>' 
                    : '<span class="badge bg-danger">Inactivo</span>';

                const badgeRol = u.rol === 'coordinador' ? 'bg-purple' : (u.rol === 'tutor' ? 'bg-info text-dark' : 'bg-secondary');

                // Si es el usuario actual o ya está inactivo, deshabilitamos el botón desactivar
                const disabledBtn = (u.id == usuarioLogueado.id || u.activo == 0) ? 'disabled' : '';

                fila.innerHTML = `
                    <td>${u.nombre} ${u.apellido}</td>
                    <td>${u.email}</td>
                    <td><span class="badge ${badgeRol}">${u.rol.toUpperCase()}</span></td>
                    <td>${badgeEstado}</td>
                    <td>${formatearFecha(u.created_at ? u.created_at.substring(0, 10) : '')}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="desactivarCuenta(${u.id}, '${u.nombre} ${u.apellido}')" ${disabledBtn}>
                            Desactivar
                        </button>
                    </td>
                `;
                tbody.appendChild(fila);
            });
        }

        async function desactivarCuenta(id, nombreCompleto) {
            if (!confirm(`¿Está seguro de que desea desactivar permanentemente al usuario "${nombreCompleto}"?\nEsta acción le impedirá el ingreso al sistema.`)) {
                return;
            }

            try {
                const res = await fetch(`${API}?accion=desactivar_usuario&id=${id}`, {
                    method: 'POST',
                    credentials: 'include'
                });
                const json = await res.json();

                if (res.ok && json.success) {
                    mostrarAlerta(`Usuario ${nombreCompleto} desactivado con éxito.`, 'success');
                    await cargarUsuarios();
                } else {
                    mostrarAlerta(json.error || 'No se pudo desactivar el usuario.', 'danger');
                }
            } catch (err) {
                mostrarAlerta('Error en la petición de red.', 'danger');
            }
        }

        function mostrarAlerta(msg, tipo) {
            const alerta = document.getElementById('alertaGlobal');
            alerta.textContent = msg;
            alerta.className = `alert alert-${tipo} py-2 px-3 m-0`;
            alerta.classList.remove('d-none');
            setTimeout(() => alerta.classList.add('d-none'), 4000);
        }

        init();
    </script>
</body>
</html>
