<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- barra de navegación -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="dashboard.html" class="nav-link activo">Inicio</a>
            <a href="proyectos/lista.html" class="nav-link">Proyectos</a>
            <a href="avances/lista.html" class="nav-link">Avances</a>
            <a href="tutorias/lista.html" class="nav-link">Tutorías</a>
            <a href="asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="usuarios/lista.html" class="nav-link">Usuarios</a>
        </div>
    <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!--Main-->
    <main class="flex-grow-1 p-4">

        <h2 class="mb-1">Dashboard</h2>

        <!--Tarjetas de resumen -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="display-5 fw-bold text-primary" id="total-proyectos">0</div>
                        <div class="text-muted small">Proyectos</div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="display-5 fw-bold text-success" id="total-avances">0</div>
                        <div class="text-muted small">Avances</div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="display-5 fw-bold text-warning" id="total-tutorias">0</div>
                        <div class="text-muted small">Tutorías</div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="display-5 fw-bold text-danger" id="total-usuarios">0</div>
                        <div class="text-muted small">Usuarios</div>
                    </div>
                </div>
            </div>

        </div>

        <!--Tabla de proyectos recientes -->
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Proyectos recientes</h5>
                <a href="proyectos/lista.html" class="btn btn-sm btn-primary">Ver todos</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Título del proyecto</th>
                            <th>Estudiante</th>
                            <th>Estado</th>
                            <th>Progreso</th>
                            <th>Fecha inicio</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-proyectos">
                        <!-- JavaScript llena este tbody -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../js/app.js"></script>
    <script>
        // Leer todos los datos
        var proyectos = getProyectos();
        var avances   = getAvances();
        var tutorias  = getTutorias();
        var usuarios  = getUsuarios();

        document.getElementById('total-proyectos').textContent = proyectos.length;
        document.getElementById('total-avances').textContent   = avances.length;
        document.getElementById('total-tutorias').textContent  = tutorias.length;
        document.getElementById('total-usuarios').textContent  = usuarios.length;

        //Llenar tabla de proyectos recientes
        var tbody = document.getElementById('tbody-proyectos');

        if (proyectos.length === 0) {
            tbody.innerHTML =
                '<tr><td colspan="5" class="text-center text-muted py-3">' +
                'No hay proyectos registrados aún.</td></tr>';
        } else {
            proyectos.slice(0, 5).forEach(function(proyecto) {

                var estudiante = getUsuarioPorId(proyecto.estudiante_id);
                var colorBadge = {
                    'aprobado':   'bg-success',
                    'en-curso':   'bg-primary',
                    'revision':   'bg-warning text-dark',
                    'suspendido': 'bg-danger',
                    'completado': 'bg-purple'
                }[proyecto.estado] || 'bg-secondary';

                var fila = document.createElement('tr');
                fila.innerHTML =
                    '<td>' + proyecto.titulo + '</td>' +
                    '<td>' + (estudiante ? estudiante.nombre : '—') + '</td>' +
                    '<td>' +
                        '<span class="badge ' + colorBadge + '">' + proyecto.estado + '</span>' +
                    '</td>' +
                    '<td style="min-width:140px">' +
                        '<small>' + proyecto.progreso + '%</small>' +
                    '</td>' +
                    '<td>' + formatearFecha(proyecto.fecha_inicio) + '</td>';

                tbody.appendChild(fila);
            });
        }
    </script>

</body>
</html>
