<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- navegacion -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html" class="nav-link">Inicio</a>
            <a href="lista.html" class="nav-link activo">Proyectos</a>
            <a href="../avances/lista.html" class="nav-link">Avances</a>
            <a href="../tutorias/lista.html" class="nav-link">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html" class="nav-link">Usuarios</a>
        </div>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 p-4">

        <h2 class="mb-4">Proyectos de Tesis</h2>

        <div class="card shadow-sm">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap">
                    <a href="formulario.html" class="btn btn-success" id="btn-nuevo">
                        + Nuevo Proyecto
                    </a>
                </div>
            </div>

            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Título</th>
                            <th>Estudiante</th>
                            <th>Tutor</th>
                            <th>Estado</th>
                            <th>Progreso</th>
                            <th>Inicio</th>
                            <th>Fin estimado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-proyectos">
                        <!-- JavaScript llena este tbody -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        // Cargar todos los proyectos
        var todosLosProyectos = getProyectos();
        var proyectosAMostrar = todosLosProyectos;

        var coloresBadge = {
            'aprobado':   'bg-success',
            'en-curso':   'bg-primary',
            'revision':   'bg-warning text-dark',
            'suspendido': 'bg-danger',
            'completado': 'bg-purple'
        };

        function renderTabla(lista) {
            var tbody = document.getElementById('tbody-proyectos');
            tbody.innerHTML = '';

            if (lista.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="8" class="text-center text-muted py-3">' +
                    'No se encontraron proyectos.</td></tr>';
                return;
            }

            lista.forEach(function(proyecto) {
                var estudiante = getUsuarioPorId(proyecto.estudiante_id);
                var tutor      = proyecto.tutor_id ? getUsuarioPorId(proyecto.tutor_id) : null;
                var badge      = coloresBadge[proyecto.estado] || 'bg-secondary';

                // Botones de acción
                var accionesHtml =
                    '<a href="formulario.html?id=' + proyecto.id + '" ' +
                    'class="btn btn-sm btn-outline-primary me-1">Editar</a>' +
                    '<button onclick="eliminar(' + proyecto.id + ')" ' +
                    'class="btn btn-sm btn-outline-danger">Eliminar</button>';

                var fila = document.createElement('tr');
                fila.innerHTML =
                    '<td>' + proyecto.titulo + '</td>' +
                    '<td>' + (estudiante ? estudiante.nombre : '—') + '</td>' +
                    '<td>' + (tutor ? tutor.nombre : '<em class="text-muted">Sin asignar</em>') + '</td>' +
                    '<td><span class="badge ' + badge + '">' + proyecto.estado + '</span></td>' +
                    '<td style="min-width:130px">' +
                        '<small>' + proyecto.progreso + '%</small>' +
                    '</td>' +
                    '<td>' + formatearFecha(proyecto.fecha_inicio) + '</td>' +
                    '<td>' + formatearFecha(proyecto.fecha_fin) + '</td>' +
                    '<td>' + accionesHtml + '</td>';

                tbody.appendChild(fila);
            });
        }

        // Dibujar la tabla al cargar la página
        renderTabla(proyectosAMostrar);

        //  Eliminar proyecto
        function eliminar(id) {
            if (!confirm('Eliminar este proyecto? Esta accion no se puede deshacer.')) 
                return;

            var actualizados = getProyectos().filter(function(p) { return p.id !== id; });
            guardarProyectos(actualizados);

            proyectosAMostrar = proyectosAMostrar.filter(function(p) { return p.id !== id; });
            renderTabla(proyectosAMostrar);
        }
    </script>

</body>
</html>
