<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia - Sistema de Gestión de Tesis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

<header class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        Sistema de Gestión de Tesis
    </span>
</header>

<nav class="navbar navbar-dark bg-secondary px-4 py-1">
    <div class="d-flex gap-3 flex-wrap">
        <a href="../dashboard.html" class="nav-link">Inicio</a>
        <a href="../proyectos/lista.html" class="nav-link">Proyectos</a>
        <a href="../Avances/lista.html" class="nav-link">Avances</a>
        <a href="../tutorias/lista.html" class="nav-link">Tutorías</a>
        <a href="registro.html" class="nav-link activo">Asistencia</a>
        <a href="../usuarios/lista.html" class="nav-link">Usuarios</a>
    </div>

    <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">
        Cerrar sesión
    </button>
</nav>

<main class="container py-4 flex-grow-1">

    <div class="card shadow-sm">

        <div class="card-header">
            <h4 class="mb-0">Registro de Asistencia</h4>
        </div>

        <div class="card-body">

            <form id="formAsistencia">

                <div class="row">

                    <div class="col-md-6 mb-3">
    <label class="form-label">
        Proyecto
    </label>

    <select
        id="proyecto_id"
        class="form-select"
        required>

        <option value="">
            Seleccione un proyecto
        </option>

    </select>
</div>

<div class="col-md-6 mb-3">
    <label class="form-label">
        Estudiante
    </label>

    <input
        type="text"
        id="estudiante"
        class="form-control"
        readonly>
</div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Fecha
                        </label>

                        <input
                            type="date"
                            id="fecha"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Estado
                        </label>

                        <select
                            id="estado"
                            class="form-select"
                            required>

                            <option value="">Seleccione</option>
                            <option value="Presente">Presente</option>
                            <option value="Ausente">Ausente</option>
                            <option value="Justificado">Justificado</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Modalidad
                        </label>

                        <select
                            id="modalidad"
                            class="form-select"
                            required>

                            <option value="">Seleccione</option>
                            <option value="Virtual">Virtual</option>
                            <option value="Presencial">Presencial</option>

                        </select>

                    </div>

                    <div class="col-12 mb-3">

                        <label class="form-label">
                            Observaciones
                        </label>

                        <textarea
                            id="observaciones"
                            class="form-control"
                            rows="3"></textarea>

                    </div>

                </div>

                <button
                    class="btn btn-primary"
                    type="submit">

                    Guardar Asistencia

                </button>

            </form>

        </div>

    </div>

    <div class="card shadow-sm mt-4">

        <div class="card-header">

            <h5 class="mb-0">
                Historial de Asistencias
            </h5>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-light">

                    <tr>

                        <th>Estudiante</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Modalidad</th>
                        <th>Observaciones</th>

                    </tr>

                </thead>

                <tbody id="tablaAsistencia">

                </tbody>

            </table>

        </div>

    </div>

</main>

<footer class="bg-dark text-white text-center py-2 small">

    © 2026 Sistema de Gestión de Proyectos de Tesis

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../js/app.js"></script>

<script src="../../js/asistencia.js"></script>

</body>
</html>
