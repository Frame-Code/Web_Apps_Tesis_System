<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avances — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- Navegación -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html"           class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html"     class="nav-link">Proyectos</a>
            <a href="lista.html"                  class="nav-link activo">Avances</a>
            <a href="../tutorias/lista.html"      class="nav-link">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html"      class="nav-link">Usuarios</a>
        </div>
        <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Avances de Tesis</h2>
            <a href="formulario.html" class="btn btn-success" id="btn-nuevo">+ Nuevo Avance</a>
        </div>

        <!-- Filtros -->
        <div class="card shadow-sm mb-3">
            <div class="card-body py-2">
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small mb-1">Filtrar por estado</label>
                        <select id="filtro-estado" class="form-select form-select-sm">
                            <option value="">— Todos —</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="revisado">Revisado</option>
                            <option value="aprobado">Aprobado</option>
                            <option value="rechazado">Rechazado</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small mb-1">Filtrar por proyecto</label>
                        <select id="filtro-proyecto" class="form-select form-select-sm">
                            <option value="">— Todos —</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button onclick="cargarAvances()" class="btn btn-sm btn-primary w-100">Buscar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div id="contenedor-cargando" class="text-center py-5 text-muted">
                    <div class="spinner-border spinner-border-sm me-2"></div> Cargando avances...
                </div>
                <table class="table table-striped table-hover mb-0 d-none" id="tabla-avances">
                    <thead class="table-dark">
                        <tr>
                            <th>Proyecto</th>
                            <th>Descripción</th>
                            <th>% Avance</th>
                            <th>Estado</th>
                            <th>Comentario tutor</th>
                            <th>Fecha registro</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-avances"></tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        const API = '../../backend/index.php';
        let usuarioActual = null;

        const BADGES = {
            pendiente: 'bg-warning text-dark',
            revisado:  'bg-info text-dark',
            aprobado:  'bg-success',
            rechazado: 'bg-danger'
        };

        const ETIQUETAS = {
            pendiente: 'Pendiente',
            revisado:  'Revisado',
            aprobado:  'Aprobado',
            rechazado: 'Rechazado'
        };

        async function init() {
            try {
                const res = await fetch(API + '?accion=sesion', { credentials: 'include' });
                if (!res.ok) { window.location.href = '../login.html'; return; }
                usuarioActual = (await res.json()).data;
            } catch (e) {
                window.location.href = '../login.html';
                return;
            }

            await cargarFiltroProyectos();
            await cargarAvances();
        }

        async function cargarFiltroProyectos() {
            try {
                const res  = await fetch(API + '?accion=listar_proyectos', { credentials: 'include' });
                const json = await res.json();
                const sel  = document.getElementById('filtro-proyecto');
                (json.data || []).forEach(function(p) {
                    const op = document.createElement('option');
                    op.value       = p.id;
                    op.textContent = p.titulo;
                    sel.appendChild(op);
                });
            } catch (e) {
                console.error('Error cargando proyectos para filtro', e);
            }
        }

        async function cargarAvances() {
            document.getElementById('contenedor-cargando').classList.remove('d-none');
            document.getElementById('tabla-avances').classList.add('d-none');

            const estado     = document.getElementById('filtro-estado').value;
            const proyectoId = document.getElementById('filtro-proyecto').value;

            let url = API + '?accion=listar_avances';
            if (estado)     url += '&estado='      + encodeURIComponent(estado);
            if (proyectoId) url += '&proyecto_id=' + encodeURIComponent(proyectoId);

            try {
                const res  = await fetch(url, { credentials: 'include' });
                const json = await res.json();

                if (!res.ok) {
                    alert('Error: ' + (json.error || 'No se pudieron cargar los avances'));
                    return;
                }

                renderTabla(json.data);
            } catch (e) {
                alert('Error de conexión con el servidor.');
            } finally {
                document.getElementById('contenedor-cargando').classList.add('d-none');
                document.getElementById('tabla-avances').classList.remove('d-none');
            }
        }

        function renderTabla(lista) {
            const tbody = document.getElementById('tbody-avances');
            tbody.innerHTML = '';

            if (!lista || lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">No se encontraron avances.</td></tr>';
                return;
            }

            const puedeEditar   = (usuarioActual.rol === 'coordinador' || usuarioActual.rol === 'tutor');
            const puedeEliminar = (usuarioActual.rol === 'coordinador');

            lista.forEach(function(a) {
                const badge = BADGES[a.estado]   || 'bg-secondary';
                const etiq  = ETIQUETAS[a.estado] || a.estado;

                // Barra de progreso
                const barra =
                    `<div class="d-flex align-items-center gap-2">
                        <div class="progress flex-grow-1" style="height:8px; min-width:80px;">
                            <div class="progress-bar" style="width:${a.porcentaje_avance}%"></div>
                        </div>
                        <small>${a.porcentaje_avance}%</small>
                    </div>`;

                let acciones = '';
                if (puedeEditar) {
                    acciones += `<a href="formulario.html?id=${a.id}" class="btn btn-sm btn-outline-primary me-1">Editar</a>`;
                }
                if (puedeEliminar) {
                    acciones += `<button onclick="eliminar(${a.id})" class="btn btn-sm btn-outline-danger">Eliminar</button>`;
                }
                if (!acciones) {
                    acciones = '<span class="text-muted small">Solo lectura</span>';
                }

                const fila = document.createElement('tr');
                fila.innerHTML =
                    `<td><small>${a.proyecto_titulo || '—'}</small></td>` +
                    `<td><small>${a.descripcion}</small></td>` +
                    `<td style="min-width:130px">${barra}</td>` +
                    `<td><span class="badge ${badge}">${etiq}</span></td>` +
                    `<td><small>${a.comentario_tutor || '<em class="text-muted">—</em>'}</small></td>` +
                    `<td><small>${formatearFecha(a.fecha_registro ? a.fecha_registro.substring(0,10) : '')}</small></td>` +
                    `<td>${acciones}</td>`;

                tbody.appendChild(fila);
            });
        }

        async function eliminar(id) {
            if (!confirm('¿Eliminar este avance? Esta acción no se puede deshacer.')) return;

            try {
                const res  = await fetch(API + '?accion=eliminar_avance&id=' + id, {
                    method:      'POST',
                    credentials: 'include',
                    headers:     { 'Content-Type': 'application/json' },
                    body:        '{}'
                });
                const json = await res.json();

                if (!res.ok) {
                    alert(json.error || 'Error al eliminar.');
                    return;
                }

                await cargarAvances();
            } catch (e) {
                alert('Error de conexión.');
            }
        }

        document.getElementById('filtro-estado').addEventListener('change', cargarAvances);
        document.getElementById('filtro-proyecto').addEventListener('change', cargarAvances);

        init();
    </script>

</body>
</html>
