<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avances — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html" class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html" class="nav-link">Proyectos</a>
            <a href="lista.html" class="nav-link activo">Avances</a>
            <a href="../tutorias/lista.html" class="nav-link">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html" class="nav-link">Usuarios</a>
        </div>
    </nav>

    <main class="flex-grow-1 p-4">

        <h2 class="mb-4">Avances de Tesis</h2>

        <div class="card shadow-sm">
            <div class="card-header">
                <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap">
                    <a href="formulario.html" class="btn btn-success" id="btn-nuevo">
                        + Nuevo Avance
                    </a>
                </div>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Proyecto</th>
                                <th>Descripción del Avance</th>
                                <th>% Avance</th>
                                <th>Fecha Registro</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-avances">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        var todosLosAvances = getAvances();
        var todosLosProyectos = getProyectos();

        var coloresBadge = {
            'aprobado': 'bg-success',
            'revision': 'bg-warning text-dark',
            'desaprobado': 'bg-danger'
        };

        function renderTabla(lista) {
            var tbody = document.getElementById('tbody-avances');
            tbody.innerHTML = '';

            if (lista.length === 0) {
                // Se cambió el colspan a 6 ya que ahora hay una columna menos
                tbody.innerHTML = 
                    '<tr><td colspan="6" class="text-center text-muted py-3">' +
                    'No se encontraron avances registrados.</td></tr>';
                return;
            }

            lista.forEach(function(avance) {
                // Relación con la entidad Proyecto
                var proyecto = todosLosProyectos.find(function(p) {
                    return p.id == avance.proyecto_id;
                });

                var badge = coloresBadge[avance.estado] || 'bg-secondary';

                var accionesHtml =
                    '<a href="formulario.html?id=' + avance.id + '" ' +
                    'class="btn btn-sm btn-outline-primary me-1">Editar</a>' +
                    '<button onclick="eliminar(' + avance.id + ')" ' +
                    'class="btn btn-sm btn-outline-danger">Eliminar</button>';

                var fila = document.createElement('tr');
                fila.innerHTML =
                    '<td>' + (proyecto ? proyecto.titulo : '<em class="text-muted">No asignado</em>') + '</td>' +
                    '<td>' + avance.descripcion + '</td>' +
                    '<td>' + avance.porcentaje_avance + '%</td>' +
                    '<td>' + formatearFecha(avance.fecha_registro) + '</td>' +
                    '<td><span class="badge ' + badge + '">' + avance.estado + '</span></td>' +
                    '<td>' + accionesHtml + '</td>';

                tbody.appendChild(fila);
            });
        }

        renderTabla(todosLosAvances);

        function eliminar(id) {
            if (!confirm('¿Eliminar este registro de avance? Esta acción no se puede deshacer.')) 
                return;

            var actualizados = getAvances().filter(function(a) { return a.id !== id; });
            guardarAvances(actualizados);
            renderTabla(actualizados);
        }
    </script>
</body>
</html>
