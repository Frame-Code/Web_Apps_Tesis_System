<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avance — Sistema de Tesis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/estilos.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Header -->
    <header class="navbar navbar-dark bg-dark px-4 py-2">
        <span class="navbar-brand fw-bold">Sistema de Gestión de Tesis</span>
    </header>

    <!-- Navegación -->
    <nav class="navbar navbar-dark bg-secondary px-4 py-1">
        <div class="d-flex gap-3 flex-wrap">
            <a href="../dashboard.html"           class="nav-link">Inicio</a>
            <a href="../proyectos/lista.html"     class="nav-link">Proyectos</a>
            <a href="lista.html"                  class="nav-link activo">Avances</a>
            <a href="../tutorias/lista.html"      class="nav-link">Tutorías</a>
            <a href="../asistencia/registro.html" class="nav-link">Asistencia</a>
            <a href="../usuarios/lista.html"      class="nav-link">Usuarios</a>
        </div>
        <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-light ms-auto">Cerrar sesión</button>
    </nav>

    <!-- Main -->
    <main class="flex-grow-1 p-4">
        <h2 class="mb-4" id="titulo-pagina">Nuevo Avance</h2>

        <div class="card shadow-sm" style="max-width: 720px;">
            <div class="card-body">

                <div class="alert alert-danger d-none"  id="alerta-error"></div>
                <div class="alert alert-success d-none" id="alerta-exito"></div>

                <form id="form-avance" onsubmit="guardar(event)">

                    <div class="mb-3">
                        <label for="proyecto_id" class="form-label">Proyecto *</label>
                        <select id="proyecto_id" class="form-select" required>
                            <option value="">— Cargando proyectos... —</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción del avance *</label>
                        <textarea id="descripcion" class="form-control" rows="3" required
                                  placeholder="Detalla los entregables de este avance..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="porcentaje_avance" class="form-label">Porcentaje de avance *</label>
                            <input type="number" id="porcentaje_avance" class="form-control"
                                   min="0" max="100" value="0" required>
                        </div>
                        <div class="col-md-6 mb-3 d-none" id="campo-estado">
                            <label for="estado" class="form-label">Estado</label>
                            <select id="estado" class="form-select">
                                <option value="pendiente">Pendiente</option>
                                <option value="revisado">Revisado</option>
                                <option value="aprobado">Aprobado</option>
                                <option value="rechazado">Rechazado</option>
                            </select>
                        </div>
                    </div>

                    <!-- Comentario tutor: solo visible en edición para coord/tutor -->
                    <div class="mb-3 d-none" id="campo-comentario">
                        <label for="comentario_tutor" class="form-label">Comentario del tutor</label>
                        <textarea id="comentario_tutor" class="form-control" rows="2"
                                  placeholder="Observaciones o correcciones..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="archivo_url" class="form-label">URL del archivo <small class="text-muted">(opcional)</small></label>
                        <input type="text" id="archivo_url" class="form-control"
                               placeholder="Ej: https://drive.google.com/file/...">
                    </div>

                    <div class="d-flex gap-2 mt-2">
                        <a href="lista.html" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success" id="btn-guardar">Guardar avance</button>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-2 small">
        &copy; 2026 Sistema de Gestión de Proyectos de Tesis
    </footer>

    <script src="../../js/app.js"></script>
    <script>
        const API      = '../../backend/index.php';
        const params   = new URLSearchParams(window.location.search);
        const idEditar = params.get('id');
        let   usuarioActual = null;

        function mostrarError(msg) {
            const el = document.getElementById('alerta-error');
            el.textContent = msg;
            el.classList.remove('d-none');
            document.getElementById('alerta-exito').classList.add('d-none');
        }

        function mostrarExito(msg) {
            const el = document.getElementById('alerta-exito');
            el.textContent = msg;
            el.classList.remove('d-none');
            document.getElementById('alerta-error').classList.add('d-none');
        }

        async function init() {
            // Verificar sesión
            try {
                const res = await fetch(API + '?accion=sesion', { credentials: 'include' });
                if (!res.ok) { window.location.href = '../login.html'; return; }
                usuarioActual = (await res.json()).data;
            } catch (e) {
                window.location.href = '../login.html';
                return;
            }

            // En edición: solo coordinador o tutor pueden acceder
            if (idEditar && usuarioActual.rol === 'estudiante') {
                window.location.href = 'lista.html';
                return;
            }

            await cargarProyectos();

            if (idEditar) {
                document.getElementById('titulo-pagina').textContent = 'Editar Avance';
                document.getElementById('campo-estado').classList.remove('d-none');

                // El comentario del tutor solo lo ve coord/tutor en edición
                if (usuarioActual.rol !== 'estudiante') {
                    document.getElementById('campo-comentario').classList.remove('d-none');
                }

                await cargarAvance(idEditar);
            }
        }

        async function cargarProyectos() {
            try {
                const res  = await fetch(API + '?accion=listar_proyectos', { credentials: 'include' });
                const json = await res.json();
                const sel  = document.getElementById('proyecto_id');
                sel.innerHTML = '<option value="">— Selecciona un proyecto —</option>';
                (json.data || []).forEach(function(p) {
                    const op = document.createElement('option');
                    op.value       = p.id;
                    op.textContent = p.titulo;
                    sel.appendChild(op);
                });
            } catch (e) {
                console.error('Error cargando proyectos', e);
            }
        }

        async function cargarAvance(id) {
            try {
                const res  = await fetch(API + '?accion=ver_avance&id=' + id, { credentials: 'include' });
                const json = await res.json();

                if (!res.ok || !json.data) {
                    mostrarError('Avance no encontrado.');
                    return;
                }

                const a = json.data;
                document.getElementById('proyecto_id').value      = a.proyecto_id;
                document.getElementById('descripcion').value      = a.descripcion;
                document.getElementById('porcentaje_avance').value = a.porcentaje_avance;
                document.getElementById('estado').value           = a.estado;
                document.getElementById('comentario_tutor').value = a.comentario_tutor || '';
                document.getElementById('archivo_url').value      = a.archivo_url      || '';
            } catch (e) {
                mostrarError('Error al cargar el avance.');
            }
        }

        async function guardar(event) {
            event.preventDefault();
            document.getElementById('alerta-error').classList.add('d-none');
            document.getElementById('alerta-exito').classList.add('d-none');

            const proyecto_id       = parseInt(document.getElementById('proyecto_id').value) || 0;
            const descripcion       = document.getElementById('descripcion').value.trim();
            const porcentaje_avance = parseInt(document.getElementById('porcentaje_avance').value) || 0;
            const estado            = document.getElementById('estado').value || 'pendiente';
            const comentario_tutor  = document.getElementById('comentario_tutor').value.trim() || null;
            const archivo_url       = document.getElementById('archivo_url').value.trim()      || null;

            if (!proyecto_id)  { mostrarError('Debes seleccionar un proyecto.'); return; }
            if (!descripcion)  { mostrarError('La descripción es obligatoria.'); return; }
            if (porcentaje_avance < 0 || porcentaje_avance > 100) {
                mostrarError('El porcentaje debe estar entre 0 y 100.');
                return;
            }

            const payload = { proyecto_id, descripcion, porcentaje_avance, estado, comentario_tutor, archivo_url };

            const btn = document.getElementById('btn-guardar');
            btn.disabled    = true;
            btn.textContent = 'Guardando...';

            try {
                const url = idEditar
                    ? API + '?accion=editar_avance&id=' + idEditar
                    : API + '?accion=crear_avance';

                const res  = await fetch(url, {
                    method:      'POST',
                    credentials: 'include',
                    headers:     { 'Content-Type': 'application/json' },
                    body:        JSON.stringify(payload)
                });
                const json = await res.json();

                if (!res.ok) {
                    mostrarError(json.error || 'Ocurrió un error al guardar.');
                    return;
                }

                mostrarExito(idEditar ? 'Avance actualizado correctamente.' : 'Avance registrado correctamente.');
                setTimeout(function() { window.location.href = 'lista.html'; }, 1500);

            } catch (e) {
                mostrarError('Error de conexión con el servidor.');
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Guardar avance';
            }
        }

        init();
    </script>

</body>
</html>
