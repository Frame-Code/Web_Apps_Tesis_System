name: PR Queue Manager

# Maneja la cola de PRs usando páginas de Notion (no database).
# Compatible con cualquier plan de Notion. 0 tokens de Claude.
#
# Convención de títulos de páginas hijas:
#   ⏳ owner/repo #NUM — Título [sha:abc1234]   → pending
#   🔍 owner/repo #NUM — Título [sha:abc1234]   → analyzing
#   ✅ owner/repo #NUM — Título [sha:abc1234]   → done
#   ⏭️ owner/repo #NUM — Título [sha:abc1234]   → skipped

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Número del PR a encolar'
        required: true
        type: string

env:
  OWNER: "Frame-Code"
  QUEUE_PAGE_ID: "38beb890-f794-81ec-be33-f3398eb91a2a"  # 🔄 PR Analysis Queue
  NOTION_VERSION: "2022-06-28"

jobs:
  manage-queue:
    name: Manage PR Queue
    runs-on: ubuntu-latest

    steps:
      # ── 1. Extraer datos del PR ──────────────────────────────────────────
      - name: Extract PR data
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}"       >> $GITHUB_OUTPUT
            echo "author=${{ github.event.pull_request.user.login }}"  >> $GITHUB_OUTPUT
            echo "title=${{ github.event.pull_request.title }}"        >> $GITHUB_OUTPUT
            echo "url=${{ github.event.pull_request.html_url }}"       >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.pull_request.head.sha }}"       >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.ref }}"      >> $GITHUB_OUTPUT
            echo "base=${{ github.event.pull_request.base.ref }}"      >> $GITHUB_OUTPUT
            echo "state=${{ github.event.pull_request.state }}"        >> $GITHUB_OUTPUT
            echo "review_state=${{ github.event.review.state }}"       >> $GITHUB_OUTPUT
            echo "reviewer=${{ github.event.review.user.login }}"      >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}"      >> $GITHUB_OUTPUT
            echo "author=${{ github.event.pull_request.user.login }}"  >> $GITHUB_OUTPUT
            echo "title=${{ github.event.pull_request.title }}"        >> $GITHUB_OUTPUT
            echo "url=${{ github.event.pull_request.html_url }}"       >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.pull_request.head.sha }}"       >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.ref }}"      >> $GITHUB_OUTPUT
            echo "base=${{ github.event.pull_request.base.ref }}"      >> $GITHUB_OUTPUT
            echo "state=${{ github.event.pull_request.state }}"        >> $GITHUB_OUTPUT
            echo "review_state="                                        >> $GITHUB_OUTPUT
            echo "reviewer="                                            >> $GITHUB_OUTPUT
          fi
          echo "repo=${{ github.repository }}"                         >> $GITHUB_OUTPUT
          # Short SHA (7 chars) para el título
          echo "short_sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── 2. Filtro: ignorar PRs del owner ────────────────────────────────
      - name: Skip if author is owner
        if: steps.pr.outputs.author == env.OWNER
        run: |
          echo "ℹ️ PR de ${{ env.OWNER }} — ignorado."
          exit 0

      # ── 3. Filtro: PR cerrado o review aprobado ──────────────────────────
      - name: Detect skip conditions
        id: skip_detect
        if: steps.pr.outputs.author != env.OWNER
        run: |
          REASON=""
          if [ "${{ steps.pr.outputs.state }}" = "closed" ]; then
            REASON="closed"
          fi
          if [ "${{ steps.pr.outputs.review_state }}" = "approved" ]; then
            REASON="approved"
          fi
          echo "reason=$REASON" >> $GITHUB_OUTPUT

      # ── 4. Filtro: Frame-Code ya revisó y no hay commits nuevos ─────────
      - name: Check owner review vs new commits
        id: owner_review
        if: |
          steps.pr.outputs.author != env.OWNER &&
          steps.skip_detect.outputs.reason == ''
        run: |
          # Obtener timestamp del último review de Frame-Code
          REVIEWS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ steps.pr.outputs.repo }}/pulls/${{ steps.pr.outputs.number }}/reviews")

          LAST_REVIEW_DATE=$(echo "$REVIEWS" | python3 -c "
          import json, sys
          reviews = json.load(sys.stdin)
          mine = [r for r in reviews if r.get('user', {}).get('login') == '${{ env.OWNER }}']
          if mine:
              latest = sorted(mine, key=lambda r: r['submitted_at'])[-1]
              print(latest['submitted_at'])
          " 2>/dev/null || echo "")

          if [ -z "$LAST_REVIEW_DATE" ]; then
            echo "block=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Sin review de ${{ env.OWNER }} — no aplica este filtro."
            exit 0
          fi

          # Contar commits posteriores al review
          COMMITS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ steps.pr.outputs.repo }}/pulls/${{ steps.pr.outputs.number }}/commits")

          NEW_COMMITS=$(echo "$COMMITS" | python3 -c "
          import json, sys
          commits = json.load(sys.stdin)
          review_date = '$LAST_REVIEW_DATE'
          new = [c for c in commits
                 if c.get('commit', {}).get('committer', {}).get('date', '') > review_date]
          print(len(new))
          " 2>/dev/null || echo "0")

          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "block=true" >> $GITHUB_OUTPUT
            echo "⏭️ ${{ env.OWNER }} ya revisó sin commits nuevos — ignorado."
          else
            echo "block=false" >> $GITHUB_OUTPUT
            echo "🆕 $NEW_COMMITS commit(s) nuevos desde el review — continúa."
          fi

      # ── 5. Buscar página existente en Notion para este PR ───────────────
      - name: Find existing Notion page for this PR
        id: notion_find
        if: steps.pr.outputs.author != env.OWNER
        run: |
          SEARCH_QUERY="${{ steps.pr.outputs.repo }} #${{ steps.pr.outputs.number }}"

          SEARCH_RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/search" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$SEARCH_QUERY\", \"filter\": {\"property\": \"object\", \"value\": \"page\"}}")

          PARENT_ID="${{ env.QUEUE_PAGE_ID }}"

          PAGE_DATA=$(echo "$SEARCH_RESPONSE" | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          parent_id = '$PARENT_ID'.replace('-', '')
          for r in data.get('results', []):
              parent = r.get('parent', {})
              pid = parent.get('page_id', '').replace('-', '')
              if pid == parent_id:
                  title_arr = r.get('properties', {}).get('title', {}).get('title', [])
                  title = ''.join(t.get('plain_text', '') for t in title_arr)
                  # Extraer SHA del título: [sha:abc1234]
                  sha_match = re.search(r'\[sha:([a-f0-9]+)\]', title)
                  stored_sha = sha_match.group(1) if sha_match else ''
                  # Detectar status por emoji
                  status = 'unknown'
                  if title.startswith('⏳'): status = 'pending'
                  elif title.startswith('✅'): status = 'done'
                  elif title.startswith('⏭️'): status = 'skipped'
                  elif title.startswith('🔍'): status = 'analyzing'
                  print(json.dumps({'id': r['id'], 'sha': stored_sha, 'status': status}))
                  break
          " 2>/dev/null || echo "")

          if [ -n "$PAGE_DATA" ]; then
            PAGE_ID=$(echo "$PAGE_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['id'])")
            STORED_SHA=$(echo "$PAGE_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['sha'])")
            PAGE_STATUS=$(echo "$PAGE_DATA" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['status'])")
            echo "found=true"          >> $GITHUB_OUTPUT
            echo "page_id=$PAGE_ID"   >> $GITHUB_OUTPUT
            echo "stored_sha=$STORED_SHA" >> $GITHUB_OUTPUT
            echo "page_status=$PAGE_STATUS" >> $GITHUB_OUTPUT
            echo "✓ Página encontrada: $PAGE_ID (status=$PAGE_STATUS, sha=$STORED_SHA)"
          else
            echo "found=false"        >> $GITHUB_OUTPUT
            echo "stored_sha="        >> $GITHUB_OUTPUT
            echo "page_status="       >> $GITHUB_OUTPUT
            echo "ℹ️ No se encontró página para este PR."
          fi

      # ── 6. Filtro: mismo SHA que el último análisis de Claude ───────────
      - name: Skip if SHA unchanged since last analysis
        if: |
          steps.pr.outputs.author != env.OWNER &&
          steps.skip_detect.outputs.reason == '' &&
          steps.owner_review.outputs.block != 'true' &&
          steps.notion_find.outputs.found == 'true' &&
          steps.notion_find.outputs.page_status == 'done' &&
          steps.notion_find.outputs.stored_sha == steps.pr.outputs.short_sha
        run: |
          echo "ℹ️ SHA sin cambios (done en sha:${{ steps.pr.outputs.short_sha }}) — ya analizado."
          exit 0

      # ── 7. Preparar emoji del título ────────────────────────────────────
      - name: Build Notion page title
        id: title
        if: steps.pr.outputs.author != env.OWNER
        run: |
          EMOJI="⏳"
          if [ -n "${{ steps.skip_detect.outputs.reason }}" ] || [ "${{ steps.owner_review.outputs.block }}" = "true" ]; then
            EMOJI="⏭️"
          fi
          echo "emoji=$EMOJI" >> $GITHUB_OUTPUT

      # ── 8a. Actualizar página existente ─────────────────────────────────
      - name: Update existing Notion page
        if: |
          steps.pr.outputs.author != env.OWNER &&
          steps.notion_find.outputs.found == 'true'
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_REPO: ${{ steps.pr.outputs.repo }}
          PR_NUM: ${{ steps.pr.outputs.number }}
          PR_SHA: ${{ steps.pr.outputs.short_sha }}
          PAGE_ID: ${{ steps.notion_find.outputs.page_id }}
          EMOJI: ${{ steps.title.outputs.emoji }}
        run: |
          FULL_TITLE="$EMOJI $PR_REPO #$PR_NUM — ${PR_TITLE:0:60} [sha:$PR_SHA]"
          BODY=$(jq -n --arg t "$FULL_TITLE" \
            '{"properties":{"title":{"title":[{"text":{"content":$t}}]}}}')
          curl -s -X PATCH \
            "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          echo "✓ Página actualizada: $EMOJI $PR_REPO #$PR_NUM"

      # ── 8b. Crear nueva página ───────────────────────────────────────────
      - name: Create new Notion page
        if: |
          steps.pr.outputs.author != env.OWNER &&
          steps.notion_find.outputs.found == 'false'
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_REPO: ${{ steps.pr.outputs.repo }}
          PR_NUM: ${{ steps.pr.outputs.number }}
          PR_SHA: ${{ steps.pr.outputs.short_sha }}
          PR_FULL_SHA: ${{ steps.pr.outputs.sha }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          PR_HEAD: ${{ steps.pr.outputs.head }}
          PR_BASE: ${{ steps.pr.outputs.base }}
          PR_URL: ${{ steps.pr.outputs.url }}
          EMOJI: ${{ steps.title.outputs.emoji }}
        run: |
          FULL_TITLE="$EMOJI $PR_REPO #$PR_NUM — ${PR_TITLE:0:60} [sha:$PR_SHA]"
          CONTENT="Repo: $PR_REPO
PR: #$PR_NUM
Autor: @$PR_AUTHOR
Branch: $PR_HEAD → $PR_BASE
SHA: $PR_FULL_SHA
URL: $PR_URL"
          BODY=$(jq -n \
            --arg parent "${{ env.QUEUE_PAGE_ID }}" \
            --arg title "$FULL_TITLE" \
            --arg content "$CONTENT" \
            '{
              parent: {page_id: $parent},
              properties: {title: {title: [{text: {content: $title}}]}},
              children: [{
                object: "block", type: "paragraph",
                paragraph: {rich_text: [{type: "text", text: {content: $content}}]}
              }]
            }')
          curl -s -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: ${{ env.NOTION_VERSION }}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
          echo "✓ Nueva página creada: $EMOJI $PR_REPO #$PR_NUM"
